<!DOCTYPE html>
<html lang="sr">
<head>

    .footer-links { display: flex; justify-content: center; gap: 24px; }
    .footer-links a { font-size: 13px; color: #aaa; text-decoration: none; }
    .footer-links a:hover { color: #69BE94; }

</head>

  <div class="card">
